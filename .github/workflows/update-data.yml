name: Actualizar datos de fondos

on:
  workflow_dispatch: {}  # Solo manual — el cron automático lo reactivamos cuando tengamos Playwright

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Procesar archivos CMF y actualizar funds.json
        run: node scripts/update-data.mjs

      - name: Confirmar y subir cambios
        run: |
          git config user.name "rnco-fundtracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/funds.json
          git diff --staged --quiet || git commit -m "Actualización datos fondos (CMF)"
          git push
